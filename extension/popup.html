<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailTrack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0F1117;
      color: #E5E7EB;
    }

    .header {
      background: #1A1D2E;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2D3149;
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #F59E0B, #D97706);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo-text h1 {
      font-size: 15px; font-weight: 700;
      color: #F9FAFB; letter-spacing: -0.02em;
    }
    .logo-text p { font-size: 11px; color: #6B7280; }

    .status-section {
      padding: 16px 20px;
      border-bottom: 1px solid #1F2333;
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px; font-weight: 600;
      background: #1F2333;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    .status-badge.active .status-dot { background: #10B981; }
    .status-badge.inactive .status-dot { background: #6B7280; }
    .status-badge.active { color: #10B981; }
    .status-badge.inactive { color: #6B7280; }

    .user-email {
      margin-top: 8px;
      font-size: 12px; color: #6B7280;
    }
    .user-email span { color: #9CA3AF; }

    .stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: #1F2333;
      border-top: 1px solid #1F2333;
      border-bottom: 1px solid #1F2333;
    }

    .stat {
      background: #0F1117;
      padding: 14px 20px;
      display: flex; flex-direction: column; gap: 2px;
    }

    .stat-value {
      font-size: 24px; font-weight: 700;
      color: #F9FAFB; font-variant-numeric: tabular-nums;
    }

    .stat-label { font-size: 11px; color: #6B7280; text-transform: uppercase; letter-spacing: 0.05em; }

    .actions {
      padding: 16px 20px;
      display: flex; flex-direction: column; gap: 8px;
    }

    button {
      width: 100%; padding: 10px 16px;
      border-radius: 8px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600;
      transition: all 0.15s;
    }

    .btn-primary {
      background: #F59E0B; color: #0F1117;
    }
    .btn-primary:hover { background: #D97706; }

    .btn-secondary {
      background: #1F2333; color: #9CA3AF;
      border: 1px solid #2D3149;
    }
    .btn-secondary:hover { background: #2D3149; color: #E5E7EB; }

    .plan-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
      background: #1F2333; color: #F59E0B;
      border: 1px solid #2D374A;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    .footer {
      padding: 10px 20px;
      border-top: 1px solid #1F2333;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer a {
      font-size: 11px; color: #6B7280;
      text-decoration: none; cursor: pointer;
    }
    .footer a:hover { color: #9CA3AF; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">📧</div>
    <div class="logo-text">
      <h1>MailTrack</h1>
      <p>Email Intelligence</p>
    </div>
  </div>

  <div class="status-section">
    <div id="statusBadge" class="status-badge inactive">
      <div class="status-dot"></div>
      <span id="statusText">Not connected</span>
    </div>
    <p class="user-email" id="userEmail"></p>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="emailCount">–</span>
      <span class="stat-label">Emails Tracked</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="planLabel">–</span>
      <span class="stat-label">Current Plan</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="dashboardBtn">Open Dashboard</button>
    <button class="btn-secondary" id="authBtn">Sign In to Activate</button>
  </div>

  <div class="footer">
    <div class="plan-badge" id="planBadge">Free</div>
    <a id="signoutLink" style="display:none">Sign out</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
